syntax = "proto3";
package aitc.risk;
option go_package = "github.com/ethicaltomas/aitc/internal/gen/aitc/risk";

import "google/protobuf/timestamp.proto";

// CASUpdateV1 represents an update to an identity's Composite Anomaly Score.
message CASUpdateV1 {
  string update_id = 1;
  string tenant_id = 2;
  string identity_id = 3;
  // previous_score before this update.
  double previous_score = 4;
  // new_score after applying contributing signals.
  double new_score = 5;
  // contributing_signal_ids are RiskSignalV1 IDs that drove this update.
  repeated string contributing_signal_ids = 6;
  google.protobuf.Timestamp computed_at = 7;
  string trace_id = 8;
}
