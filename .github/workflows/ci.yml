name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  # ── Step 2.7: Go lint, test, build ──────────────────────────────────────
  go:
    name: Go — lint, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b $(go env GOPATH)/bin latest

      - name: go vet
        run: go vet ./...

      - name: lint
        run: golangci-lint run ./... --timeout=5m

      - name: build
        run: go build ./...

      - name: test
        run: go test -race -timeout=120s ./...

  # ── Step 2.7: Migration validation ──────────────────────────────────────
  migrations:
    name: Validate goose migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aitc
          POSTGRES_PASSWORD: aitc
          POSTGRES_DB: aitc
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Run migrations up
        env:
          POSTGRES_DSN: "postgres://aitc:aitc@localhost:5432/aitc?sslmode=disable"
        run: |
          goose -dir db/migrations/postgres postgres "$POSTGRES_DSN" up

      - name: Run migrations down (validate reversibility)
        env:
          POSTGRES_DSN: "postgres://aitc:aitc@localhost:5432/aitc?sslmode=disable"
        run: |
          goose -dir db/migrations/postgres postgres "$POSTGRES_DSN" down-to 0

  # ── Step 2.7: Proto generation check ────────────────────────────────────
  proto-check:
    name: Proto — generate and verify up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Install protoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc-gen-go
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11

      - name: make proto
        run: make proto

      - name: make proto-export
        run: make proto-export

      - name: Verify generated code is up-to-date
        run: |
          git diff --exit-code || (echo "ERROR: Generated proto code is out of date. Run 'make proto && make proto-export' and commit the results." && exit 1)

  # ── Step 2.7: make proto / migrate / test / lint (Kafka-only pipeline) ──
  integration-checks:
    name: make proto / migrate / test / lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aitc
          POSTGRES_PASSWORD: aitc
          POSTGRES_DB: aitc
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Install protoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y protobuf-compiler

      - name: Install Go tools (protoc-gen-go, goose, golangci-lint)
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install github.com/pressly/goose/v3/cmd/goose@latest
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b $(go env GOPATH)/bin latest

      - name: make proto
        run: make proto

      - name: Verify generated protos are up-to-date
        run: |
          git diff --exit-code || (echo "ERROR: Generated proto code is out of date. Run 'make proto' and commit the results." && exit 1)

      - name: make migrate
        env:
          POSTGRES_DSN: "postgres://aitc:aitc@localhost:5432/aitc?sslmode=disable"
        run: make migrate

      - name: make test
        run: make test

      - name: make lint
        run: make lint

  # ── Step 2.7: Python checks (LLM reasoner) ──────────────────────────────
  python:
    name: Python — LLM reasoner lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install ruff

      - name: ruff check
        run: |
          if [ -d services/llm_reasoner ]; then
            ruff check services/llm_reasoner/
          fi

