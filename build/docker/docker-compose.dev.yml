version: "3.9"

# Step 2.6: Local development environment.
# Services: Postgres, Redis, Kafka + Zookeeper, MinIO (S3-compatible).
# All services are health-checked. Credentials here are dev-only.
# Step 0.7: No production credentials or tokens in this file.

services:

  # ── Postgres ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aitc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aitc
      POSTGRES_PASSWORD: aitc          # dev-only; never use in production
      POSTGRES_DB: aitc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./../../db/seeds/dev/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitc -d aitc"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aitc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Zookeeper (required by Kafka KRaft-less setup) ───────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: aitc-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ─────────────────────────────────────────────────────────────────
  # Topics: raw-events, normalized-events, risk-signals,
  #         action-recommendations, action-requests  (+ *.dlq variants)
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: aitc-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_MESSAGE_MAX_BYTES: 10485760       # 10 MB cap (Step 1.3 bounded payload)
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── MinIO (S3-compatible raw/report archive) ─────────────────────────────
  # Step 2.6: dev raw/report archives via MinIO.
  # Step 0.7: credentials here are dev-only.
  minio:
    image: minio/minio:latest
    container_name: aitc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aitcdev           # dev-only
      MINIO_ROOT_PASSWORD: aitcdevpass   # dev-only; never use in production
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application services ──────────────────────────────────────────────────
  # Each service is built from the repo root using Dockerfile.goservice with the
  # SERVICE build arg selecting the cmd/ subdirectory.
  # Config files are bind-mounted read-only from configs/env/.
  # Hosts inside the compose network use service names (postgres, redis, kafka)
  # instead of localhost; the env vars below override the defaults in YAML.

  # ── Ingestion (port 8080) ─────────────────────────────────────────────────
  ingestion:
    build:
      context: ../..
      dockerfile: build/docker/Dockerfile.goservice
      args:
        SERVICE: ingestion
    container_name: aitc-ingestion
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../../configs:/app/configs:ro
      - ../../contracts:/app/contracts:ro
    working_dir: /app
    environment:
      POSTGRES_DSN: "postgres://aitc:aitc@postgres:5432/aitc?sslmode=disable"
      KAFKA_BROKERS: "kafka:29092"
      REDIS_ADDR: "redis:6379"
      S3_ENDPOINT: "http://minio:9000"
      AWS_ACCESS_KEY_ID: aitcdev
      AWS_SECRET_ACCESS_KEY: aitcdevpass
    command: ["/app/service", "-config", "configs/env/ingestion.yaml"]
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Pipeline (port 8081) ──────────────────────────────────────────────────
  pipeline:
    build:
      context: ../..
      dockerfile: build/docker/Dockerfile.goservice
      args:
        SERVICE: pipeline
    container_name: aitc-pipeline
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../configs:/app/configs:ro
    working_dir: /app
    environment:
      POSTGRES_DSN: "postgres://aitc:aitc@postgres:5432/aitc?sslmode=disable"
      KAFKA_BROKERS: "kafka:29092"
      REDIS_ADDR: "redis:6379"
    command: ["/app/service", "-config", "configs/env/pipeline.yaml"]
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Controlplane (port 8084) ──────────────────────────────────────────────
  controlplane:
    build:
      context: ../..
      dockerfile: build/docker/Dockerfile.goservice
      args:
        SERVICE: controlplane
    container_name: aitc-controlplane
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ../../configs:/app/configs:ro
      - ../../contracts:/app/contracts:ro
    working_dir: /app
    environment:
      POSTGRES_DSN: "postgres://aitc:aitc@postgres:5432/aitc?sslmode=disable"
      KAFKA_BROKERS: "kafka:29092"
    command: ["/app/service", "-config", "configs/env/controlplane.yaml"]
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Enforcement-Okta (port 8083) ──────────────────────────────────────────
  enforcement-okta:
    build:
      context: ../..
      dockerfile: build/docker/Dockerfile.goservice
      args:
        SERVICE: enforcement-okta
    container_name: aitc-enforcement-okta
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ../../configs:/app/configs:ro
      - ../../contracts:/app/contracts:ro
    working_dir: /app
    environment:
      POSTGRES_DSN: "postgres://aitc:aitc@postgres:5432/aitc?sslmode=disable"
      KAFKA_BROKERS: "kafka:29092"
      OKTA_TOKEN: ""   # set via OKTA_TOKEN env var in shell; never commit a real token
    command: ["/app/service", "-config", "configs/env/enforcement-okta.yaml"]
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── API (port 8085) ───────────────────────────────────────────────────────
  api:
    build:
      context: ../..
      dockerfile: build/docker/Dockerfile.goservice
      args:
        SERVICE: api
    container_name: aitc-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../configs:/app/configs:ro
    working_dir: /app
    environment:
      POSTGRES_DSN: "postgres://aitc:aitc@postgres:5432/aitc?sslmode=disable"
      KAFKA_BROKERS: "kafka:29092"
      REDIS_ADDR: "redis:6379"
      S3_ENDPOINT: "http://minio:9000"
      AWS_ACCESS_KEY_ID: aitcdev
      AWS_SECRET_ACCESS_KEY: aitcdevpass
      DEV_AUTH_STUB: "true"   # disables Okta OIDC; set okta.base_url in prod config
    command: ["/app/service", "-config", "configs/env/api.yaml"]
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Evidence (port 8086) ──────────────────────────────────────────────────
  evidence:
    build:
      context: ../..
      dockerfile: build/docker/Dockerfile.goservice
      args:
        SERVICE: evidence
    container_name: aitc-evidence
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../../configs:/app/configs:ro
    working_dir: /app
    environment:
      POSTGRES_DSN: "postgres://aitc:aitc@postgres:5432/aitc?sslmode=disable"
      S3_ENDPOINT: "http://minio:9000"
      AWS_ACCESS_KEY_ID: aitcdev
      AWS_SECRET_ACCESS_KEY: aitcdevpass
    command: ["/app/service", "-config", "configs/env/evidence.yaml"]
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── LLM Reasoner (port 8087, optional) ───────────────────────────────────
  # Advisory-only. No Okta/M365 credentials accepted.
  # Set OPENAI_API_KEY in the shell environment to enable the real LLM provider;
  # without it the service starts in stub mode (safe for local demos).
  llm-reasoner:
    build:
      context: ../..
      dockerfile: build/docker/Dockerfile.python
    container_name: aitc-llm-reasoner
    restart: unless-stopped
    environment:
      LLM_PROVIDER: "${LLM_PROVIDER:-stub}"
      LLM_MODEL: "${LLM_MODEL:-gpt-4o-mini}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"   # empty = stub mode; never commit a real key
    ports:
      - "8087:8087"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  minio_data:

