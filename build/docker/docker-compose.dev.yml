version: "3.9"

# Step 2.6: Local development environment.
# Services: Postgres, Redis, Kafka + Zookeeper, MinIO (S3-compatible).
# All services are health-checked. Credentials here are dev-only.
# Step 0.7: No production credentials or tokens in this file.

services:

  # ── Postgres ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aitc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aitc
      POSTGRES_PASSWORD: aitc          # dev-only; never use in production
      POSTGRES_DB: aitc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./../../db/seeds/dev/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitc -d aitc"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aitc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Zookeeper (required by Kafka KRaft-less setup) ───────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: aitc-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ─────────────────────────────────────────────────────────────────
  # Topics: raw-events, normalized-events, risk-signals,
  #         action-recommendations, action-requests  (+ *.dlq variants)
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: aitc-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_MESSAGE_MAX_BYTES: 10485760       # 10 MB cap (Step 1.3 bounded payload)
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── MinIO (S3-compatible raw/report archive) ─────────────────────────────
  # Step 2.6: dev raw/report archives via MinIO.
  # Step 0.7: credentials here are dev-only.
  minio:
    image: minio/minio:latest
    container_name: aitc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aitcdev           # dev-only
      MINIO_ROOT_PASSWORD: aitcdevpass   # dev-only; never use in production
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:


